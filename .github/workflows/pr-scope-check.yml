name: PR Scope and Release Metadata Summary

'on':
  pull_request:

jobs:
  pr-scope-check:
    name: Summarize changed files and release metadata coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine diff range
        id: diff_range
        shell: bash
        run: |
          set -euo pipefail

          base_ref="origin/${GITHUB_BASE_REF}"
          git fetch --no-tags origin "${GITHUB_BASE_REF}"
          merge_base="$(git merge-base HEAD "${base_ref}")"
          range="${merge_base}..HEAD"

          echo "range=${range}" >> "$GITHUB_OUTPUT"
          echo "Using diff range: ${range}"

      - name: Summarize PR changes and release metadata coverage (informational)
        shell: bash
        run: |
          set -euo pipefail
          ./.codex/scripts/pr-scope-check.sh "${{ steps.diff_range.outputs.range }}"
